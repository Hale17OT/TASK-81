<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>My Tags</title></head>
<body>
<div layout:fragment="content">
    <div class="fluent-stack" style="gap: var(--spacingVerticalXXL);">
        <div class="d-flex justify-between items-center">
            <h1>My Tags</h1>
            <a th:href="@{/profile}" class="fluent-btn fluent-btn--outline">Back to Profile</a>
        </div>
        <div class="fluent-card">
            <div class="fluent-card-body">
                <div th:if="${tags != null and !tags.isEmpty()}" class="d-flex" style="flex-wrap:wrap; gap: var(--spacingHorizontalS);">
                    <span th:each="tag : ${tags}" class="fluent-chip">
                        <span th:text="${tag}">Tag</span>
                        <form th:action="@{/profile/tags/{t}/delete(t=${tag})}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="fluent-chip-remove" title="Remove">&times;</button>
                        </form>
                    </span>
                </div>
                <div th:if="${tags == null or tags.isEmpty()}" class="empty-state">
                    <p>No tags yet. Add tags like "lab supplies" or "graduation" to personalize your experience.</p>
                </div>
            </div>
        </div>
        <div class="fluent-card">
            <div class="fluent-card-header"><h2>Add Tag</h2></div>
            <div class="fluent-card-body">
                <form th:action="@{/profile/tags}" method="post" class="d-flex" style="gap: var(--spacingHorizontalS);" data-prevent-double-submit>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="text" name="tag" class="fluent-input" placeholder="Enter a tag..." maxlength="50" required/>
                    <button type="submit" class="fluent-btn fluent-btn--primary">Add</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>

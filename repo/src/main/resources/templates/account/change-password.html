<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Change Password</title>
</head>
<body>
<div layout:fragment="content">
    <div class="fluent-page fluent-page--narrow">

        <h1 class="fluent-heading fluent-heading--lg">Change Password</h1>

        <div class="fluent-alert fluent-alert--warning" th:if="${forceChange}">
            <strong>Password rotation required.</strong>
            Your account is using a bootstrap password. Set a new one to continue.
        </div>

        <div class="fluent-alert fluent-alert--danger" th:if="${errorMessage}" th:text="${errorMessage}">Error</div>
        <div class="fluent-alert fluent-alert--success" th:if="${successMessage}" th:text="${successMessage}">Success</div>

        <form th:action="@{/account/change-password}" method="post" class="fluent-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="fluent-form-group">
                <label class="fluent-label" for="oldPassword">Current password</label>
                <input type="password" id="oldPassword" name="oldPassword"
                       class="fluent-input" required autocomplete="current-password"/>
            </div>

            <div class="fluent-form-group">
                <label class="fluent-label" for="newPassword">New password (min 8 characters)</label>
                <input type="password" id="newPassword" name="newPassword"
                       class="fluent-input" minlength="8" required autocomplete="new-password"/>
            </div>

            <div class="fluent-form-group">
                <label class="fluent-label" for="confirmPassword">Confirm new password</label>
                <input type="password" id="confirmPassword" name="confirmPassword"
                       class="fluent-input" minlength="8" required autocomplete="new-password"/>
            </div>

            <button type="submit" class="fluent-button fluent-button--primary">Update password</button>
        </form>

    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- Notification bell for nav bar -->
<div th:fragment="notificationBell" class="fluent-notification" sec:authorize="isAuthenticated()">
    <button class="fluent-notification__bell" id="notificationToggle"
            aria-label="Notifications" aria-expanded="false" aria-haspopup="true">
        <span class="fluent-notification__icon"></span>
        <span class="fluent-notification__badge" id="unread-count"
              th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}"
              th:text="${unreadNotificationCount}">0</span>
    </button>

    <!-- Dropdown -->
    <div class="fluent-notification__dropdown" id="notificationDropdown" role="menu" hidden>
        <div class="fluent-notification__header">
            <h3 class="fluent-notification__title">Notifications</h3>
            <form th:action="@{/notifications/mark-all-read}" method="post"
                  th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="fluent-button fluent-button--text fluent-button--sm">
                    Mark all as read
                </button>
            </form>
        </div>

        <ul class="fluent-notification__list">
            <li th:each="notification : ${recentNotifications}"
                class="fluent-notification__item"
                th:classappend="${notification.isRead == null or !notification.isRead} ? 'fluent-notification__item--unread'">
                <div class="fluent-notification__content">
                    <p class="fluent-notification__message" th:text="${notification.message}">Notification message</p>
                    <span class="fluent-notification__time"
                          th:text="${#temporals.format(notification.createdAt, 'MMM d, h:mm a')}">Jan 1, 12:00 PM</span>
                </div>
                <form th:if="${notification.isRead == null or !notification.isRead}"
                      th:action="@{/notifications/{id}/mark-read(id=${notification.id})}" method="post"
                      class="fluent-notification__action">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="fluent-button fluent-button--text fluent-button--sm"
                            aria-label="Mark as read">
                        <span class="fluent-notification__mark-read-icon"></span>
                    </button>
                </form>
            </li>
            <li th:if="${#lists.isEmpty(recentNotifications)}" class="fluent-notification__empty">
                <p>No notifications</p>
            </li>
        </ul>

        <div class="fluent-notification__footer">
            <a th:href="@{/notifications}" class="fluent-button fluent-button--text">
                View all notifications
            </a>
        </div>
    </div>
</div>

</body>
</html>

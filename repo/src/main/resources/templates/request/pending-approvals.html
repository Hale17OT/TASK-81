<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>Pending Approvals</title>
</head>
<body>
<div layout:fragment="content">
    <div class="fluent-page fluent-page--approvals">

        <div class="fluent-page__header">
            <h1 class="fluent-heading fluent-heading--lg">Pending Approvals</h1>
            <p class="fluent-text fluent-text--subtitle">Review and approve item requests from your department.</p>
        </div>

        <!-- Approvals Table -->
        <div class="fluent-table-container" th:if="${requests != null and requests.hasContent()}">
            <table class="fluent-table">
                <thead class="fluent-table__head">
                    <tr>
                        <th class="fluent-table__th">Requester</th>
                        <th class="fluent-table__th">Item</th>
                        <th class="fluent-table__th">Quantity</th>
                        <th class="fluent-table__th">Justification</th>
                        <th class="fluent-table__th">Requested</th>
                        <th class="fluent-table__th">Actions</th>
                    </tr>
                </thead>
                <tbody class="fluent-table__body">
                    <tr th:each="req : ${requests.content}" class="fluent-table__row">
                        <td class="fluent-table__td" th:text="${req.requester.displayName}">Student Name</td>
                        <td class="fluent-table__td">
                            <a th:href="@{/inventory/{id}(id=${req.item.id})}"
                               th:text="${req.item.name}"
                               class="fluent-link">Item Name</a>
                        </td>
                        <td class="fluent-table__td" th:text="${req.quantity}">1</td>
                        <td class="fluent-table__td">
                            <span class="fluent-text fluent-text--truncate"
                                  th:text="${req.justification}">Justification text</span>
                        </td>
                        <td class="fluent-table__td"
                            th:text="${#temporals.format(req.createdAt, 'MMM d, yyyy')}">Jan 1, 2025</td>
                        <td class="fluent-table__td">
                            <div class="fluent-button-group">
                                <form th:action="@{/requests/{id}/approve(id=${req.id})}" method="post"
                                      class="fluent-inline-form">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            class="fluent-button fluent-button--success fluent-button--sm">Approve</button>
                                </form>
                                <form th:action="@{/requests/{id}/reject(id=${req.id})}" method="post"
                                      class="fluent-inline-form"
                                      style="display:flex; gap: var(--spacingHorizontalXS); align-items:center;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="text" name="reason" required minlength="1" maxlength="500"
                                           placeholder="Reason"
                                           class="fluent-input fluent-input--sm" style="max-width: 160px;"/>
                                    <button type="submit"
                                            class="fluent-button fluent-button--danger fluent-button--sm">Reject</button>
                                </form>
                                <!-- Details link only for admins; teachers approve/reject from this list
                                     to satisfy strict least-privilege request visibility. -->
                                <a sec:authorize="hasRole('ADMIN')"
                                   th:href="@{/requests/{id}(id=${req.id})}"
                                   class="fluent-button fluent-button--text fluent-button--sm">Details</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Pagination -->
            <div th:replace="~{fragments/pagination :: pagination(${requests}, '/requests/pending')}"></div>
        </div>

        <!-- Empty State -->
        <div class="fluent-empty-state" th:if="${requests == null or !requests.hasContent()}">
            <div class="fluent-empty-state__icon fluent-empty-state__icon--approvals"></div>
            <h3 class="fluent-empty-state__title">No pending approvals</h3>
            <p class="fluent-empty-state__description">
                There are no requests waiting for your approval at this time.
            </p>
        </div>

    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Access Denied</title>
</head>
<body>
<div layout:fragment="content">
    <div class="fluent-error">
        <div class="fluent-empty-state">
            <div class="fluent-empty-state__icon fluent-empty-state__icon--403"></div>
            <h1 class="fluent-empty-state__title">403</h1>
            <h2 class="fluent-empty-state__subtitle">Access Denied</h2>
            <p class="fluent-empty-state__description">
                You do not have permission to access this page. Please contact an administrator if you believe this is a mistake.
            </p>
            <div class="fluent-empty-state__actions">
                <a th:href="@{/}" class="fluent-button fluent-button--primary">Back to Home</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>

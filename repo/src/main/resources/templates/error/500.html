<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Server Error</title>
</head>
<body>
<div layout:fragment="content">
    <div class="fluent-error">
        <div class="fluent-empty-state">
            <div class="fluent-empty-state__icon fluent-empty-state__icon--500"></div>
            <h1 class="fluent-empty-state__title">500</h1>
            <h2 class="fluent-empty-state__subtitle">Internal Server Error</h2>
            <p class="fluent-empty-state__description">
                Something went wrong on our end. Please try again later.
            </p>
            <div class="fluent-empty-state__actions">
                <a th:href="@{/}" class="fluent-button fluent-button--primary">Back to Home</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
